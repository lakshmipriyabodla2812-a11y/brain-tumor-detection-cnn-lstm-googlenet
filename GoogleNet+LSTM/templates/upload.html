
<!DOCTYPE html>
<html>
<head>
    <title>Upload Image</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#9bbcc6;">

<div class="container mt-5">
    <div class="col-md-6 offset-md-3 bg-white p-4 rounded text-center">

        <h3>Upload MRI Image</h3>

        <form method="POST" action="/upload" enctype="multipart/form-data">

            <input type="file" name="file" class="form-control mt-3" required>

            <select name="algorithm" class="form-control mt-3">
                <option value="GoogleNet">GoogleNet + LSTM</option>
            </select>

            <br>
            <button class="btn btn-primary w-100">Predict</button>

        </form>

    </div>
<div style="text-align:right; padding:15px;">
    <a href="{{ url_for('user') }}" class="btn btn-danger">Logout</a>
</div>
</body>
</html>
