<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#9bbcc6;">

<div class="container mt-5">
    <div class="col-md-4 offset-md-4 bg-white p-4 rounded text-center">

        <h3>User Registration</h3>

        <form method="POST" action="/regback">
            <input type="text" name="name" class="form-control mt-2" placeholder="Name" required>
            <input type="email" name="email" class="form-control mt-2" placeholder="Email" required>
            <input type="password" name="pwd" class="form-control mt-2" placeholder="Password" required>
            <input type="text" name="pno" class="form-control mt-2" placeholder="Phone" required>

            <br>
            <button class="btn btn-success w-100">Register</button>
        </form>

    </div>
</div>

</body>
</html>
