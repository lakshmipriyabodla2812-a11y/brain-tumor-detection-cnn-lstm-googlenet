<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>User Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url("https://images.unsplash.com/photo-1581091215367-59ab6b6e8d7b") no-repeat center center/cover;
            font-family: 'Poppins', sans-serif;
        }

        .main-box {
            background: white;
            margin: 50px auto;
            padding: 30px;
            width: 80%;
            border-radius: 10px;
            text-align: center;
        }

        .navbar-custom {
            background: #ff880e;
        }

        .navbar a {
            color: white !important;
            font-weight: bold;
            margin: 0 15px;
        }

        .login-box {
            background: rgba(255,255,255,0.95);
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        .btn-custom {
            background: #007bff;
            color: white;
        }

        .register-link {
            color: red;
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="main-box">

    <img src="{{ url_for('static', filename='images/brain.jpg') }}" width="120"><br><br>

    <h2 style="color:#273e71;">
        Brain Tumor Detection using Deep Learning Algorithm CNN-GoogleNet With LSTM
    </h2>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-custom mt-3 justify-content-center">
        <div>
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('about') }}">About Project</a>
            <a href="{{ url_for('user') }}">User</a>
        </div>
    </nav>

</div>

<!-- LOGIN FORM -->
<div class="login-box">

    <h3 style="color:#273e71;"><b>User Login Form</b></h3>

    <form method="POST" action="/userlog">

        <input type="email" name="email" class="form-control mt-3" placeholder="Email" required>

        <input type="password" name="pwd" class="form-control mt-3" placeholder="Password" required>

        <br>

        <button type="submit" class="btn btn-custom w-100">LOGIN</button>

    </form>

    <br>

    <a href="{{ url_for('reg') }}" class="register-link">
        New Registration...
    </a>

</div>

</body>
</html>
